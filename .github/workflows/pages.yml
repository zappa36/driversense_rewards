name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Stamp asset versions (cache busting)
        run: |
          SHA="${GITHUB_SHA::8}"
          sed -i -E "s/(src|href)=\"([A-Za-z0-9_-]+\.(js|css))\"/\1=\"\2?v=$SHA\"/g" *.html
          grep -o 'src="[^"]*\.js[^"]*"' index.html | head -5
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
